name: Weekly Cloudflare Analytics

on:
  schedule:
    # Every Monday 09:00 UTC — reports on the previous 7 days
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync

      - name: Fetch analytics and build report
        id: report
        env:
          CF_API_TOKEN:   ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_TAG: ${{ vars.CF_ACCOUNT_TAG }}
          CF_SITE_TAG:    ${{ vars.CF_SITE_TAG }}
        run: uv run python .github/scripts/fetch_analytics.py

      - name: Publish to job summary
        run: cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit analytics history if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/scripts/analytics-history.json
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore(analytics): append week ending ${{ steps.report.outputs.week_ending }}"
            git push
          fi

      - name: Open issue with report
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Weekly analytics — week ending ${{ steps.report.outputs.week_ending }} (${{ steps.report.outputs.pageviews }} pageviews, ${{ steps.report.outputs.visits }} visits)"
          content-filepath: report.md
          labels: analytics
          assignees: Stanley-Okwii

      - name: Upload report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-analytics-${{ github.run_id }}
          path: |
            report.md
            report.html
