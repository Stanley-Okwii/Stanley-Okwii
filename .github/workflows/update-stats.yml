name: Update stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * 1-5'

permissions:
  contents: write

jobs:
  fetch-and-commit:
    name: Fetch WakaTime + GitHub stats and commit JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch WakaTime stats
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python .github/scripts/fetch_wakatime.py

      - name: Fetch GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/fetch_github_stats.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/wakatime.json docs/data/github.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update stats"
            git push
          fi
