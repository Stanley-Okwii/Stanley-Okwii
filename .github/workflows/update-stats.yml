name: Update stats

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/templates/achievement.yaml'
      - '.github/scripts/build_cv_json.py'
  schedule:
    - cron: '0 23 * * 1-5'

permissions:
  contents: write

jobs:
  fetch-and-commit:
    name: Sync CV, WakaTime and GitHub data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync

      - name: Build cv.json from YAML
        run: uv run python .github/scripts/build_cv_json.py

      - name: Render CV PDF
        run: uv run rendercv render src/templates/achievement.yaml

      - name: Copy CV PDF into docs/
        run: |
          src_pdf=""
          for cand in src/cvs/Stanley_Okwii_CV.pdf src/resumes/Stanley_Okwii_CV.pdf; do
            if [ -f "$cand" ]; then src_pdf="$cand"; break; fi
          done
          if [ -z "$src_pdf" ]; then
            echo "Rendered CV PDF not found under src/cvs or src/resumes" >&2
            exit 1
          fi
          cp "$src_pdf" docs/cv.pdf
          echo "Copied $src_pdf → docs/cv.pdf"

      - name: Fetch WakaTime stats
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python .github/scripts/fetch_wakatime.py

      - name: Fetch GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/fetch_github_stats.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/cv.json docs/data/wakatime.json docs/data/github.json docs/cv.pdf
          for cand in src/cvs/Stanley_Okwii_CV.pdf src/resumes/Stanley_Okwii_CV.pdf; do
            if [ -f "$cand" ]; then git add "$cand"; fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync CV + stats"
            git push
          fi
