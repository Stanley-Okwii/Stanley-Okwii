<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening resume — Stanley Okwii</title>
<meta name="description" content="Stanley Okwii — Senior Full-Stack Engineer. Resume PDF.">
<meta name="robots" content="noindex">

<script>
  (function(){
    try {
      var saved = localStorage.getItem('theme');
      var valid = (saved === 'dark' || saved === 'light');
      var systemLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      document.documentElement.setAttribute('data-theme', valid ? saved : (systemLight ? 'light' : 'dark'));
    } catch(e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%237fd3ff' stroke-width='3'/%3E%3C/svg%3E">

<!-- JS-disabled fallback -->
<noscript><meta http-equiv="refresh" content="0; url=/assets/cv.pdf"></noscript>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">

<!-- Cloudflare Web Analytics — this page exists so a beacon fires on resume clicks -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "60990e56273040928855da0d78e4bff0"}'></script>

<style>
:root[data-theme="dark"]{--bg:#0a2540;--ink:#e4f0ff;--dim:#6d92bc;--accent:#7fd3ff;--border:rgba(180,220,255,0.12);--grid-fine:rgba(180,220,255,0.05);--grid-coarse:rgba(180,220,255,0.12)}
:root[data-theme="light"]{--bg:#f6f2e8;--ink:#1a3452;--dim:#6a7a92;--accent:#1a6fb0;--border:rgba(20,60,120,0.15);--grid-fine:rgba(20,60,120,0.04);--grid-coarse:rgba(20,60,120,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--ink);
  font-family:'IBM Plex Sans',-apple-system,sans-serif;font-size:14px;line-height:1.5;
  background-image:
    linear-gradient(var(--grid-fine) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-fine) 1px,transparent 1px),
    linear-gradient(var(--grid-coarse) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-coarse) 1px,transparent 1px);
  background-size:20px 20px,20px 20px,100px 100px,100px 100px;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
  transition:background-color .3s ease,color .3s ease;
}
.stack{display:flex;flex-direction:column;align-items:center;gap:1.1rem;text-align:center}
.title{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.25em;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:.7rem}
.title::before{content:'◆';color:#ffc857}
.caption{color:var(--dim);font-size:13px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em}
.spinner{
  width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
.fallback{color:var(--dim);font-size:12px;margin-top:.8rem;font-family:'IBM Plex Mono',monospace}
.fallback a{color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="stack">
  <div class="spinner" aria-hidden="true"></div>
  <div class="title">Opening resume</div>
  <div class="caption">Stanley Okwii · Senior Full-Stack Engineer</div>
  <div class="fallback">Not redirecting? <a href="/assets/cv.pdf" target="_blank" rel="noopener">Open directly →</a></div>
</div>

<script>
  // Let the Cloudflare beacon fire (it's defer-loaded), then redirect.
  setTimeout(function(){ location.replace('/assets/cv.pdf'); }, 500);
</script>

</body>
</html>
