<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Stanley Okwii</title>
<meta name="description" content="Stanley Okwii — Senior Full-Stack Engineer. Resume PDF.">
<meta name="robots" content="noindex">

<script>
  (function(){
    try {
      var saved = localStorage.getItem('theme');
      var valid = (saved === 'dark' || saved === 'light');
      var systemLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      document.documentElement.setAttribute('data-theme', valid ? saved : (systemLight ? 'light' : 'dark'));
    } catch(e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    // On touch devices, inline PDF rendering is unreliable — open the PDF directly.
    // Add class synchronously so the loader (not the static button) renders. Wait
    // for window.load so the deferred Cloudflare beacon has executed, then a short
    // grace window for its in-flight fetch to land before we navigate away.
    if (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
      document.documentElement.classList.add('is-mobile-js');
      window.addEventListener('load', function(){
        setTimeout(function(){ location.replace('/assets/cv.pdf'); }, 100);
      });
    }
  })();
</script>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%237fd3ff' stroke-width='3'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">

<!-- Cloudflare Web Analytics — beacon fires on resume views -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "60990e56273040928855da0d78e4bff0"}'></script>

<style>
:root[data-theme="dark"]{--bg:#0a2540;--ink:#e4f0ff;--dim:#6d92bc;--accent:#7fd3ff;--border:rgba(180,220,255,0.12);--grid-fine:rgba(180,220,255,0.05);--grid-coarse:rgba(180,220,255,0.12)}
:root[data-theme="light"]{--bg:#f6f2e8;--ink:#1a3452;--dim:#6a7a92;--accent:#1a6fb0;--border:rgba(20,60,120,0.15);--grid-fine:rgba(20,60,120,0.04);--grid-coarse:rgba(20,60,120,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--ink)}
body{font-family:'IBM Plex Sans',-apple-system,sans-serif;font-size:14px;line-height:1.5}

.pdf{display:block;width:100vw;height:100vh;border:0;background:var(--bg)}

.mobile-card{
  display:none;
  min-height:100vh;
  flex-direction:column;align-items:center;justify-content:center;
  gap:1.25rem;padding:2rem;text-align:center;
  background-image:
    linear-gradient(var(--grid-fine) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-fine) 1px,transparent 1px),
    linear-gradient(var(--grid-coarse) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-coarse) 1px,transparent 1px);
  background-size:20px 20px,20px 20px,100px 100px,100px 100px;
}
.mobile-card .title{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.25em;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:.7rem}
.mobile-card .title::before{content:'◆';color:#ffc857}
.mobile-card .caption{color:var(--dim);font-size:13px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em}
.mobile-card .btn{
  margin-top:.75rem;
  display:inline-block;padding:.75rem 1.25rem;
  font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.05em;
  color:var(--bg);background:var(--accent);
  border:1px solid var(--accent);border-radius:4px;
  text-decoration:none;transition:opacity .2s ease;
}
.mobile-card .btn:hover{opacity:.88}

.mobile-card .loader,.mobile-card .static-card{display:flex;flex-direction:column;align-items:center;gap:1.1rem}
.mobile-card .loader{display:none}
:root.is-mobile-js .mobile-card .loader{display:flex}
:root.is-mobile-js .mobile-card .static-card{display:none}

.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media (hover: none) and (pointer: coarse){
  .pdf{display:none}
  .mobile-card{display:flex}
}
</style>
</head>
<body>

<iframe class="pdf" src="/assets/cv.pdf" title="Stanley Okwii — Resume"></iframe>

<div class="mobile-card">
  <div class="loader" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <div class="title">Opening resume</div>
    <div class="caption">Stanley Okwii · Senior Full-Stack Engineer</div>
  </div>
  <div class="static-card">
    <div class="title">Resume</div>
    <div class="caption">Stanley Okwii · Senior Full-Stack Engineer</div>
    <a href="/assets/cv.pdf" class="btn" target="_blank" rel="noopener">Open resume →</a>
  </div>
</div>

</body>
</html>
